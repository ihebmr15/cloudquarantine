apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudquarantine-sa

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloudquarantine-role
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "patch"]

  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloudquarantine-binding
subjects:
  - kind: ServiceAccount
    name: cloudquarantine-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: cloudquarantine-role
  apiGroup: rbac.authorization.k8s.io
