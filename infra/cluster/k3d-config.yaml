apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: cloudquarantine
servers: 1
agents: 2
ports:
  - port: 8081:80
    nodeFilters:
      - loadbalancer
  - port: 8443:443
    nodeFilters:
      - loadbalancer
options:
  k3d:
    wait: true
    timeout: "120s"
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
registries:
  create:
    name: cq-registry
    host: "0.0.0.0"
    hostPort: "5001"
